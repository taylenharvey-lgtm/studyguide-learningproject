<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Video Player with Playlists</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Outfit:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    .font-heading { font-family: 'Space Grotesk', sans-serif; }
    .font-body { font-family: 'Outfit', sans-serif; }
    
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 16px;
    }
    
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .glow-effect {
      box-shadow: 0 0 60px -10px rgba(139, 92, 246, 0.3);
    }
    
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    
    .pulse-hover:hover {
      animation: pulse 0.6s ease-in-out;
    }
    
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 50;
    }
    
    .modal-overlay.active {
      display: flex;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full font-body">
  <div id="app-wrapper" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);">
   <div class="max-w-4xl mx-auto px-4 py-8 sm:py-12">
    <!-- Header -->
    <header class="text-center mb-8 fade-in">
     <div class="inline-flex items-center gap-3 mb-4">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-red-500 to-pink-600 flex items-center justify-center shadow-lg">
       <svg class="w-6 h-6 text-white" fill="currentColor" viewbox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
       </svg>
      </div>
      <h1 id="page-title" class="font-heading text-3xl sm:text-4xl font-bold text-white">Video Player</h1>
     </div>
     <p class="text-gray-400 text-lg">Paste a YouTube link below to start watching</p>
    </header><!-- Input Section -->
    <div class="mb-8 fade-in" style="animation-delay: 0.1s;">
     <form id="video-form" class="flex flex-col sm:flex-row gap-3">
      <div class="flex-1 relative">
       <input type="text" id="url-input" placeholder="Paste YouTube URL here..." class="w-full px-5 py-4 bg-white/10 backdrop-blur-sm border border-white/20 rounded-xl text-white placeholder-gray-400 focus:outline-none input-glow transition-all duration-300"> <button type="button" id="clear-btn" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors hidden" aria-label="Clear input">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg></button>
      </div><button type="submit" class="px-8 py-4 bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 text-white font-semibold rounded-xl transition-all duration-300 pulse-hover shadow-lg shadow-violet-500/25"> <span class="flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg> Play </span> </button>
     </form>
    </div><!-- Video Player Section -->
    <div id="player-section" class="fade-in" style="animation-delay: 0.2s;">
     <!-- Empty State -->
     <div id="empty-state" class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-12 text-center">
      <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-white/10 flex items-center justify-center">
       <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
       </svg>
      </div>
      <h3 class="font-heading text-xl font-semibold text-white mb-2">No Video Playing</h3>
      <p class="text-gray-400">Enter a YouTube URL above to watch a video</p>
     </div><!-- Video Player -->
     <div id="video-player" class="hidden">
      <div class="video-container glow-effect bg-black/50">
       <iframe id="youtube-iframe" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div><!-- Video Info -->
      <div id="video-info" class="mt-4 p-4 bg-white/5 backdrop-blur-sm border border-white/10 rounded-xl">
       <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3 flex-1">
         <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-red-400" fill="currentColor" viewbox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z" /> <path fill="#fff" d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
          </svg>
         </div>
         <div>
          <p class="text-white font-medium">Now Playing</p>
          <p id="video-id-display" class="text-gray-400 text-sm">Video ID: --</p>
         </div>
        </div>
        <div class="flex gap-2">
         <button id="add-to-playlist-btn" class="px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-lg transition-colors flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg> Add </button> <button id="new-video-btn" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white text-sm font-medium rounded-lg transition-colors"> New </button>
        </div>
       </div>
      </div>
     </div>
    </div><!-- Playlists Section -->
    <div id="playlists-section" class="mt-12 fade-in">
     <div class="flex items-center justify-between mb-4">
      <h2 class="font-heading text-lg font-semibold text-white">My Playlists</h2><button id="create-playlist-btn" class="px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-lg transition-colors flex items-center gap-2">
       <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
       </svg> New Playlist </button>
     </div>
     <div id="playlists-list" class="space-y-2"><!-- Playlists will be inserted here -->
     </div>
     <div id="no-playlists" class="text-center py-8 text-gray-400">
      <p>No playlists yet. Create one to get started!</p>
     </div>
    </div><!-- Current Playlist View -->
    <div id="current-playlist-section" class="mt-8 hidden fade-in">
     <div class="flex items-center justify-between mb-4">
      <div>
       <h2 id="current-playlist-title" class="font-heading text-lg font-semibold text-white">Playlist Name</h2>
       <p id="current-playlist-count" class="text-gray-400 text-sm">0 videos</p>
      </div><button id="back-to-playlists-btn" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white text-sm font-medium rounded-lg transition-colors"> Back </button>
     </div><!-- Add videos to playlist form -->
     <div class="mb-6 p-4 bg-white/5 border border-white/10 rounded-lg">
      <form id="playlist-add-form" class="space-y-3"><textarea id="playlist-url-input" placeholder="Paste YouTube URLs here (one per line)..." class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none input-glow transition-all duration-300 resize-none h-20"></textarea> <button type="submit" class="px-6 py-2 bg-violet-600 hover:bg-violet-500 text-white font-medium rounded-lg transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg> Add to Playlist </button>
      </form>
     </div>
     <div id="playlist-videos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"><!-- Playlist videos will be inserted here -->
     </div>
    </div>
   </div>
  </div><!-- Create Playlist Modal -->
  <div id="playlist-modal" class="modal-overlay items-center justify-center">
   <div class="bg-gray-900 rounded-xl p-6 w-full max-w-md mx-4 border border-white/10">
    <h3 class="font-heading text-xl font-semibold text-white mb-4">Create New Playlist</h3><input type="text" id="playlist-name-input" placeholder="Enter playlist name..." class="w-full px-4 py-2 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none input-glow transition-all duration-300 mb-4">
    <div class="flex gap-3">
     <button id="cancel-playlist-btn" class="flex-1 px-4 py-2 bg-white/10 hover:bg-white/20 text-white font-medium rounded-lg transition-colors"> Cancel </button> <button id="confirm-playlist-btn" class="flex-1 px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white font-medium rounded-lg transition-colors"> Create </button>
    </div>
   </div>
  </div><!-- Add to Playlist Modal -->
  <div id="add-to-playlist-modal" class="modal-overlay items-center justify-center">
   <div class="bg-gray-900 rounded-xl p-6 w-full max-w-md mx-4 border border-white/10">
    <h3 class="font-heading text-xl font-semibold text-white mb-4">Add to Playlist</h3>
    <div id="playlists-for-add" class="space-y-2 mb-4 max-h-64 overflow-y-auto"><!-- Playlists will be listed here -->
    </div><button id="close-add-modal-btn" class="w-full px-4 py-2 bg-white/10 hover:bg-white/20 text-white font-medium rounded-lg transition-colors"> Close </button>
   </div>
  </div>
  <script>
    const defaultConfig = {
      page_title: 'Video Player',
      input_placeholder: 'Paste YouTube URL here...',
      background_color: '#0f0f1a',
      accent_color: '#8b5cf6',
      text_color: '#ffffff',
      font_family: 'Outfit',
      font_size: 16
    };

    let playlists = [];
    let currentPlaylistId = null;
    let playlistIdCounter = 0;
    let currentVideoId = null;

    // Playlist Functions
    function createPlaylist(name) {
      const newPlaylist = {
        id: playlistIdCounter++,
        name: name || `Playlist ${playlists.length + 1}`,
        videos: []
      };
      playlists.push(newPlaylist);
      updatePlaylistsUI();
      closeModal('playlist-modal');
      return newPlaylist.id;
    }

    function getPlaylist(id) {
      return playlists.find(p => p.id === id);
    }

    function addVideoToPlaylist(playlistId, videoId) {
      const playlist = getPlaylist(playlistId);
      if (playlist && !playlist.videos.includes(videoId)) {
        playlist.videos.push(videoId);
        if (currentPlaylistId === playlistId) {
          updatePlaylistVideosUI();
        }
        return true;
      }
      return false;
    }

    function removeVideoFromPlaylist(videoId) {
      const playlist = getPlaylist(currentPlaylistId);
      if (playlist) {
        playlist.videos = playlist.videos.filter(id => id !== videoId);
        updatePlaylistVideosUI();
      }
    }

    function deletePlaylist(id) {
      playlists = playlists.filter(p => p.id !== id);
      if (currentPlaylistId === id) {
        closePlaylist();
      }
      updatePlaylistsUI();
    }

    function openPlaylist(id) {
      currentPlaylistId = id;
      const playlist = getPlaylist(id);
      document.getElementById('current-playlist-title').textContent = playlist.name;
      document.getElementById('current-playlist-section').classList.remove('hidden');
      document.getElementById('playlists-section').classList.add('hidden');
      updatePlaylistVideosUI();
    }

    function closePlaylist() {
      currentPlaylistId = null;
      document.getElementById('current-playlist-section').classList.add('hidden');
      document.getElementById('playlists-section').classList.remove('hidden');
    }

    function updatePlaylistsUI() {
      const playlistsList = document.getElementById('playlists-list');
      const noPlaylists = document.getElementById('no-playlists');

      if (playlists.length === 0) {
        playlistsList.innerHTML = '';
        noPlaylists.classList.remove('hidden');
        return;
      }

      noPlaylists.classList.add('hidden');
      playlistsList.innerHTML = '';

      playlists.forEach(playlist => {
        const item = document.createElement('div');
        item.className = 'flex items-center justify-between p-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg transition-colors cursor-pointer group';
        item.innerHTML = `
          <div class="flex-1 min-w-0">
            <p class="text-white font-medium truncate">${playlist.name}</p>
            <p class="text-gray-400 text-sm">${playlist.videos.length} video${playlist.videos.length !== 1 ? 's' : ''}</p>
          </div>
          <button class="px-3 py-1 bg-white/10 opacity-0 group-hover:opacity-100 text-white text-xs font-medium rounded transition-all hover:bg-red-500/50 flex-shrink-0">
            Delete
          </button>
        `;

        item.addEventListener('click', (e) => {
          if (!e.target.classList.contains('bg-red-500/50')) {
            openPlaylist(playlist.id);
          }
        });

        item.querySelector('button').addEventListener('click', (e) => {
          e.stopPropagation();
          deletePlaylist(playlist.id);
        });

        playlistsList.appendChild(item);
      });
    }

    function updatePlaylistVideosUI() {
      const playlist = getPlaylist(currentPlaylistId);
      if (!playlist) return;

      document.getElementById('current-playlist-count').textContent = `${playlist.videos.length} video${playlist.videos.length !== 1 ? 's' : ''}`;

      const videosContainer = document.getElementById('playlist-videos');
      videosContainer.innerHTML = '';

      playlist.videos.forEach(videoId => {
        const thumbnail = document.createElement('div');
        thumbnail.className = 'group relative aspect-video rounded-lg overflow-hidden bg-black/50 hover:ring-2 hover:ring-violet-500 transition-all';
        thumbnail.innerHTML = `
          <img 
            src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" 
            alt="Video thumbnail"
            class="w-full h-full object-cover cursor-pointer"
            loading="lazy"
            onerror="this.style.display='none';"
          >
          <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
            <button class="play-btn p-2 bg-violet-600 hover:bg-violet-500 rounded-full transition-colors">
              <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
            <button class="remove-btn p-2 bg-red-600 hover:bg-red-500 rounded-full transition-colors">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
        `;

        thumbnail.querySelector('.play-btn').addEventListener('click', () => loadVideo(videoId));
        thumbnail.querySelector('.remove-btn').addEventListener('click', () => removeVideoFromPlaylist(videoId));

        videosContainer.appendChild(thumbnail);
      });
    }

    // Video Functions
    function extractVideoId(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/watch\?.*&v=)([^#\&\?]*)/,
        /^([a-zA-Z0-9_-]{11})$/
      ];

      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) {
          return match[1];
        }
      }
      return null;
    }

    function loadVideo(videoId) {
      const iframe = document.getElementById('youtube-iframe');
      const emptyState = document.getElementById('empty-state');
      const videoPlayer = document.getElementById('video-player');
      const videoIdDisplay = document.getElementById('video-id-display');

      currentVideoId = videoId;
      iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      videoIdDisplay.textContent = `Video ID: ${videoId}`;

      emptyState.classList.add('hidden');
      videoPlayer.classList.remove('hidden');
    }

    function resetPlayer() {
      const iframe = document.getElementById('youtube-iframe');
      const emptyState = document.getElementById('empty-state');
      const videoPlayer = document.getElementById('video-player');
      const urlInput = document.getElementById('url-input');

      currentVideoId = null;
      iframe.src = '';
      emptyState.classList.remove('hidden');
      videoPlayer.classList.add('hidden');
      urlInput.value = '';
      urlInput.focus();
    }

    function showError(message) {
      const input = document.getElementById('url-input');
      input.classList.add('border-red-500');
      input.placeholder = message;

      setTimeout(() => {
        input.classList.remove('border-red-500');
        input.placeholder = defaultConfig.input_placeholder;
      }, 3000);
    }

    // Modal Functions
    function openModal(modalId) {
      document.getElementById(modalId).classList.add('active');
      if (modalId === 'playlist-modal') {
        document.getElementById('playlist-name-input').focus();
      }
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
      if (modalId === 'playlist-modal') {
        document.getElementById('playlist-name-input').value = '';
      }
    }

    // Event Listeners
    function initEventListeners() {
      const form = document.getElementById('video-form');
      const urlInput = document.getElementById('url-input');
      const clearBtn = document.getElementById('clear-btn');
      const newVideoBtn = document.getElementById('new-video-btn');
      const createPlaylistBtn = document.getElementById('create-playlist-btn');
      const cancelPlaylistBtn = document.getElementById('cancel-playlist-btn');
      const confirmPlaylistBtn = document.getElementById('confirm-playlist-btn');
      const playlistNameInput = document.getElementById('playlist-name-input');
      const addToPlaylistBtn = document.getElementById('add-to-playlist-btn');
      const closeAddModalBtn = document.getElementById('close-add-modal-btn');
      const backToPlaylistsBtn = document.getElementById('back-to-playlists-btn');

      // Form submission
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const url = urlInput.value.trim();

        if (!url) {
          showError('Please enter a YouTube URL');
          return;
        }

        const videoId = extractVideoId(url);

        if (!videoId) {
          showError('Invalid YouTube URL');
          return;
        }

        loadVideo(videoId);
        urlInput.value = '';
        clearBtn.classList.add('hidden');
      });

      // Input clear button
      urlInput.addEventListener('input', () => {
        clearBtn.classList.toggle('hidden', !urlInput.value);
      });

      clearBtn.addEventListener('click', () => {
        urlInput.value = '';
        clearBtn.classList.add('hidden');
        urlInput.focus();
      });

      // Video controls
      newVideoBtn.addEventListener('click', resetPlayer);

      // Playlist modals
      createPlaylistBtn.addEventListener('click', () => openModal('playlist-modal'));
      cancelPlaylistBtn.addEventListener('click', () => closeModal('playlist-modal'));

      confirmPlaylistBtn.addEventListener('click', () => {
        const name = playlistNameInput.value.trim();
        if (name) {
          createPlaylist(name);
        }
      });

      playlistNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          confirmPlaylistBtn.click();
        }
      });

      // Add to playlist
      addToPlaylistBtn.addEventListener('click', () => {
        if (!currentVideoId) return;

        const playlistsForAdd = document.getElementById('playlists-for-add');
        playlistsForAdd.innerHTML = '';

        if (playlists.length === 0) {
          playlistsForAdd.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">No playlists yet</p>';
        } else {
          playlists.forEach(playlist => {
            const btn = document.createElement('button');
            btn.className = 'w-full text-left px-4 py-2 bg-white/10 hover:bg-white/20 text-white rounded-lg transition-colors';
            btn.textContent = `${playlist.name} (${playlist.videos.length})`;
            btn.onclick = () => {
              if (addVideoToPlaylist(playlist.id, currentVideoId)) {
                closeModal('add-to-playlist-modal');
              }
            };
            playlistsForAdd.appendChild(btn);
          });
        }

        openModal('add-to-playlist-modal');
      });

      closeAddModalBtn.addEventListener('click', () => closeModal('add-to-playlist-modal'));
      backToPlaylistsBtn.addEventListener('click', closePlaylist);

      // Add videos to current playlist
      document.getElementById('playlist-add-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const input = document.getElementById('playlist-url-input');
        const urls = input.value.trim().split('\n').map(url => url.trim()).filter(url => url);

        if (urls.length === 0) {
          showError('Please enter at least one YouTube URL');
          return;
        }

        let addedCount = 0;
        urls.forEach(url => {
          const videoId = extractVideoId(url);
          if (videoId && addVideoToPlaylist(currentPlaylistId, videoId)) {
            addedCount++;
          }
        });

        if (addedCount > 0) {
          input.value = '';
          updatePlaylistVideosUI();
        } else {
          showError('No valid YouTube URLs found');
        }
      });

      // Close modals on backdrop click
      document.getElementById('playlist-modal').addEventListener('click', (e) => {
        if (e.target.id === 'playlist-modal') closeModal('playlist-modal');
      });

      document.getElementById('add-to-playlist-modal').addEventListener('click', (e) => {

    async function onConfigChange(config) {
      const pageTitle = document.getElementById('page-title');
      const urlInput = document.getElementById('url-input');
      const appWrapper = document.getElementById('app-wrapper');

      pageTitle.textContent = config.page_title || defaultConfig.page_title;

      const bgColor = config.background_color || defaultConfig.background_color;
      appWrapper.style.background = `linear-gradient(135deg, ${bgColor} 0%, ${adjustColor(bgColor, 20)} 50%, ${adjustColor(bgColor, 40)} 100%)`;

      const fontFamily = config.font_family || defaultConfig.font_family;
      document.body.style.fontFamily = `${fontFamily}, Outfit, sans-serif`;

      const fontSize = config.font_size || defaultConfig.font_size;
      document.body.style.fontSize = `${fontSize}px`;
    }

    function adjustColor(hex, amount) {
      const num = parseInt(hex.replace('#', ''), 16);
      const r = Math.min(255, Math.max(0, (num >> 16) + amount));
      const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
      const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
      return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;

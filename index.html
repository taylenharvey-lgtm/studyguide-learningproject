<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Video Player</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Outfit:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    .font-heading { font-family: 'Space Grotesk', sans-serif; }
    .font-body { font-family: 'Outfit', sans-serif; }
    
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 16px;
    }
    
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .glow-effect {
      box-shadow: 0 0 60px -10px rgba(139, 92, 246, 0.3);
    }
    
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    
    .pulse-hover:hover {
      animation: pulse 0.6s ease-in-out;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full font-body">
  <div id="app-wrapper" class="min-h-full w-full overflow-auto" style="background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);">
   <div class="max-w-4xl mx-auto px-4 py-8 sm:py-12"><!-- Header -->
    <header class="text-center mb-8 fade-in">
     <div class="inline-flex items-center gap-3 mb-4">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-red-500 to-pink-600 flex items-center justify-center shadow-lg">
       <svg class="w-6 h-6 text-white" fill="currentColor" viewbox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
       </svg>
      </div>
      <h1 id="page-title" class="font-heading text-3xl sm:text-4xl font-bold text-white">Video Player</h1>
     </div>
     <p class="text-gray-400 text-lg">Paste a YouTube link below to start watching</p>
    </header><!-- Input Section -->
    <div class="mb-8 fade-in" style="animation-delay: 0.1s;">
     <form id="video-form" class="flex flex-col sm:flex-row gap-3">
      <div class="flex-1 relative"><input type="text" id="url-input" placeholder="Paste YouTube URL here..." class="w-full px-5 py-4 bg-white/10 backdrop-blur-sm border border-white/20 rounded-xl text-white placeholder-gray-400 focus:outline-none input-glow transition-all duration-300"> <button type="button" id="clear-btn" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors hidden" aria-label="Clear input">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg></button>
      </div><button type="submit" class="px-8 py-4 bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 text-white font-semibold rounded-xl transition-all duration-300 pulse-hover shadow-lg shadow-violet-500/25"> <span class="flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg> Play </span> </button>
     </form>
    </div><!-- Video Player Section -->
    <div id="player-section" class="fade-in" style="animation-delay: 0.2s;"><!-- Empty State -->
     <div id="empty-state" class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-12 text-center">
      <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-white/10 flex items-center justify-center">
       <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
       </svg>
      </div>
      <h3 class="font-heading text-xl font-semibold text-white mb-2">No Video Playing</h3>
      <p class="text-gray-400">Enter a YouTube URL above to watch a video</p>
     </div><!-- Video Player -->
     <div id="video-player" class="hidden">
      <div class="video-container glow-effect bg-black/50"><iframe id="youtube-iframe" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div><!-- Video Info -->
      <div id="video-info" class="mt-4 p-4 bg-white/5 backdrop-blur-sm border border-white/10 rounded-xl">
       <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
         <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center">
          <svg class="w-5 h-5 text-red-400" fill="currentColor" viewbox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z" /> <path fill="#fff" d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
          </svg>
         </div>
         <div>
          <p class="text-white font-medium">Now Playing</p>
          <p id="video-id-display" class="text-gray-400 text-sm">Video ID: --</p>
         </div>
        </div><button id="new-video-btn" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white text-sm font-medium rounded-lg transition-colors"> New Video </button>
       </div>
      </div>
     </div>
    </div><!-- Recent Videos -->
    <div id="recent-section" class="mt-8 hidden fade-in">
     <div class="flex items-center justify-between mb-4">
      <h2 class="font-heading text-lg font-semibold text-white">Recently Watched</h2><button id="clear-history-btn" class="text-gray-400 hover:text-white text-sm transition-colors"> Clear All </button>
     </div>
     <div id="recent-videos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"><!-- Recent videos will be inserted here -->
     </div>
    </div><!-- Tips Section -->
    <div class="mt-12 fade-in" style="animation-delay: 0.3s;">
     <div class="bg-gradient-to-r from-violet-500/10 to-purple-500/10 border border-violet-500/20 rounded-xl p-6">
      <h3 class="font-heading text-lg font-semibold text-white mb-3 flex items-center gap-2">
       <svg class="w-5 h-5 text-violet-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
       </svg> Supported Formats</h3>
      <ul class="text-gray-300 text-sm space-y-2">
       <li class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-violet-400"></span> youtube.com/watch?v=VIDEO_ID</li>
       <li class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-violet-400"></span> youtu.be/VIDEO_ID</li>
       <li class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-violet-400"></span> youtube.com/embed/VIDEO_ID</li>
      </ul>
     </div>
    </div>
   </div>
  </div>
  <script>
    // Default configuration
    const defaultConfig = {
      page_title: 'Video Player',
      input_placeholder: 'Paste YouTube URL here...',
      background_color: '#0f0f1a',
      accent_color: '#8b5cf6',
      text_color: '#ffffff',
      font_family: 'Outfit',
      font_size: 16
    };
    
    // Recent videos storage (in-memory for this session)
    let recentVideos = [];
    const MAX_RECENT = 8;
    
    // Extract YouTube video ID from various URL formats
    function extractVideoId(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/watch\?.*&v=)([^#\&\?]*)/,
        /^([a-zA-Z0-9_-]{11})$/
      ];
      
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) {
          return match[1];
        }
      }
      return null;
    }
    
    // Load video into player
    function loadVideo(videoId) {
      const iframe = document.getElementById('youtube-iframe');
      const emptyState = document.getElementById('empty-state');
      const videoPlayer = document.getElementById('video-player');
      const videoIdDisplay = document.getElementById('video-id-display');
      
      iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      videoIdDisplay.textContent = `Video ID: ${videoId}`;
      
      emptyState.classList.add('hidden');
      videoPlayer.classList.remove('hidden');
      
      // Add to recent videos
      addToRecent(videoId);
    }
    
    // Add video to recent history
    function addToRecent(videoId) {
      // Remove if already exists
      recentVideos = recentVideos.filter(id => id !== videoId);
      // Add to beginning
      recentVideos.unshift(videoId);
      // Keep only MAX_RECENT
      if (recentVideos.length > MAX_RECENT) {
        recentVideos = recentVideos.slice(0, MAX_RECENT);
      }
      updateRecentUI();
    }
    
    // Update recent videos UI
    function updateRecentUI() {
      const recentSection = document.getElementById('recent-section');
      const recentContainer = document.getElementById('recent-videos');
      
      if (recentVideos.length === 0) {
        recentSection.classList.add('hidden');
        return;
      }
      
      recentSection.classList.remove('hidden');
      recentContainer.innerHTML = '';
      
      recentVideos.forEach(videoId => {
        const thumbnail = document.createElement('button');
        thumbnail.className = 'group relative aspect-video rounded-lg overflow-hidden bg-black/50 hover:ring-2 hover:ring-violet-500 transition-all';
        thumbnail.innerHTML = `
          <img 
            src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" 
            alt="Video thumbnail"
            class="w-full h-full object-cover"
            loading="lazy"
            onerror="this.style.display='none';"
          >
          <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
            <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </div>
        `;
        thumbnail.onclick = () => loadVideo(videoId);
        recentContainer.appendChild(thumbnail);
      });
    }
    
    // Show error message
    function showError(message) {
      const input = document.getElementById('url-input');
      input.classList.add('border-red-500');
      input.placeholder = message;
      
      setTimeout(() => {
        input.classList.remove('border-red-500');
        input.placeholder = defaultConfig.input_placeholder;
      }, 3000);
    }
    
    // Reset player to empty state
    function resetPlayer() {
      const iframe = document.getElementById('youtube-iframe');
      const emptyState = document.getElementById('empty-state');
      const videoPlayer = document.getElementById('video-player');
      const urlInput = document.getElementById('url-input');
      
      iframe.src = '';
      emptyState.classList.remove('hidden');
      videoPlayer.classList.add('hidden');
      urlInput.value = '';
      urlInput.focus();
    }
    
    // Initialize event listeners
    function initEventListeners() {
      const form = document.getElementById('video-form');
      const urlInput = document.getElementById('url-input');
      const clearBtn = document.getElementById('clear-btn');
      const newVideoBtn = document.getElementById('new-video-btn');
      const clearHistoryBtn = document.getElementById('clear-history-btn');
      
      // Form submission
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const url = urlInput.value.trim();
        
        if (!url) {
          showError('Please enter a YouTube URL');
          return;
        }
        
        const videoId = extractVideoId(url);
        
        if (!videoId) {
          showError('Invalid YouTube URL');
          return;
        }
        
        loadVideo(videoId);
      });
      
      // Input clear button visibility
      urlInput.addEventListener('input', () => {
        clearBtn.classList.toggle('hidden', !urlInput.value);
      });
      
      // Clear input
      clearBtn.addEventListener('click', () => {
        urlInput.value = '';
        clearBtn.classList.add('hidden');
        urlInput.focus();
      });
      
      // New video button
      newVideoBtn.addEventListener('click', resetPlayer);
      
      // Clear history
      clearHistoryBtn.addEventListener('click', () => {
        recentVideos = [];
        updateRecentUI();
      });
    }
    
    // Element SDK integration
    async function onConfigChange(config) {
      const pageTitle = document.getElementById('page-title');
      const urlInput = document.getElementById('url-input');
      const appWrapper = document.getElementById('app-wrapper');
      
      // Update title
      pageTitle.textContent = config.page_title || defaultConfig.page_title;
      
      // Update placeholder
      urlInput.placeholder = config.input_placeholder || defaultConfig.input_placeholder;
      
      // Update colors
      const bgColor = config.background_color || defaultConfig.background_color;
      const accentColor = config.accent_color || defaultConfig.accent_color;
      const textColor = config.text_color || defaultConfig.text_color;
      
      appWrapper.style.background = `linear-gradient(135deg, ${bgColor} 0%, ${adjustColor(bgColor, 20)} 50%, ${adjustColor(bgColor, 40)} 100%)`;
      pageTitle.style.color = textColor;
      
      // Update font
      const fontFamily = config.font_family || defaultConfig.font_family;
      document.body.style.fontFamily = `${fontFamily}, Outfit, sans-serif`;
      
      // Update font size
      const fontSize = config.font_size || defaultConfig.font_size;
      document.body.style.fontSize = `${fontSize}px`;
    }
    
    // Helper to adjust color brightness
    function adjustColor(hex, amount) {
      const num = parseInt(hex.replace('#', ''), 16);
      const r = Math.min(255, Math.max(0, (num >> 16) + amount));
      const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
      const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
      return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
    }
    
    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (value) => window.elementSdk.setConfig({ background_color: value })
            },
            {
              get: () => config.accent_color || defaultConfig.accent_color,
              set: (value) => window.elementSdk.setConfig({ accent_color: value })
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (value) => window.elementSdk.setConfig({ text_color: value })
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (value) => window.elementSdk.setConfig({ font_family: value })
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size,
            set: (value) => window.elementSdk.setConfig({ font_size: value })
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['page_title', config.page_title || defaultConfig.page_title],
          ['input_placeholder', config.input_placeholder || defaultConfig.input_placeholder]
        ])
      });
    }
    
    // Initialize app
    initEventListeners();
  </script>
